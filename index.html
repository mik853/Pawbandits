<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PawBandits — WL Submission</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rye&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-snap-type:y mandatory}
body{background:#111111;overflow-x:hidden;cursor:crosshair}

/* GRAIN overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.07'/%3E%3C/svg%3E");
  opacity:0.6;mix-blend-mode:overlay;
}

/* ==========================
   PAGE 1 - LANDING
   ========================== */
#page1{
  min-height:100vh;scroll-snap-align:start;
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
  background:radial-gradient(ellipse 90% 70% at 50% 45%, #1a1a1a 0%, #0f0f0f 55%, #0d0804 100%);
}

/* Chalk texture SVG canvas */
.bg-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

/* WL subtitle */
.wl-sub{
  position:relative;z-index:5;
  font-family:'Courier Prime',monospace;
  font-size:clamp(10px,2.5vw,14px);
  color:#888888;letter-spacing:0.55em;text-transform:uppercase;
  margin-bottom:4px;
  animation:fadeUp 0.9s ease 0.1s both;
}

/* BIG TITLE */
.title-wrap{position:relative;z-index:5;text-align:center;line-height:0.82;animation:fadeUp 0.9s ease 0.2s both}
.t-paw{
  display:block;font-family:'Black Ops One',cursive;
  font-size:clamp(90px,24vw,210px);
  letter-spacing:0.07em;color:#d8d8d8;
  text-shadow:7px 7px 0 #2a2a2a,-3px -2px 0 #1a1a1a,4px -4px 0 #333333;
  animation:titleWobble 7s ease-in-out infinite;
}
.t-bandits{
  display:block;font-family:'Black Ops One',cursive;
  font-size:clamp(90px,24vw,210px);
  letter-spacing:0.07em;color:#e0e0e0;
  text-shadow:7px 7px 0 #7a3800,-3px -2px 0 #333333,4px -5px 0 #555555;
  animation:titleWobble 7s ease-in-out infinite 0.6s;
}
@keyframes titleWobble{
  0%,100%{transform:rotate(-0.6deg) skewX(0)}
  30%{transform:rotate(0.5deg) skewX(0.3deg)}
  60%{transform:rotate(-0.3deg) skewX(-0.2deg)}
}



  50%{transform:translate(-50%,-54%) rotate(1.5deg)}
}

/* Tagline */
.tagline{
  position:relative;z-index:5;
  font-family:'Courier Prime',monospace;
  font-size:clamp(11px,2.5vw,15px);
  color:#999999;letter-spacing:0.3em;text-transform:uppercase;
  margin-top:10px;
  animation:fadeUp 0.9s ease 0.4s both;
}

/* JOIN BUTTON */
.join-wrap{position:relative;z-index:5;margin-top:28px;animation:fadeUp 0.9s ease 0.65s both}
.join-btn{
  display:inline-block;cursor:pointer;
  transition:transform 0.15s ease;
}
.join-btn:hover{transform:scale(1.08) rotate(-2deg)}
.join-btn:active{transform:scale(0.95) rotate(1deg)}
.join-inner{
  font-family:'Rye',cursive;
  font-size:clamp(30px,7vw,56px);
  color:#0f0f0f;background:#e0e0e0;
  padding:10px 52px 16px;
  display:inline-block;
  border:3.5px solid #2a2a2a;
  border-radius:9px;
  box-shadow:6px 7px 0 #2a2a2a, 2px 3px 0 #444444;
  letter-spacing:0.04em;position:relative;
}
.join-inner::before{
  content:'';position:absolute;top:5px;left:8px;right:25%;height:3px;
  background:rgba(255,255,255,0.28);border-radius:2px;
}

/* Mini walking raccoons */
.walker{position:absolute;z-index:3;pointer-events:none;opacity:0.6}

/* Floating decorations */
.deco{position:absolute;z-index:4;pointer-events:none}

/* Twinkle stars */
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.25;transform:scale(0.6)}}
@keyframes floatBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-16px) rotate(3deg)}}
@keyframes walkR{0%{transform:translateX(-100px) scaleX(1)}49.9%{transform:translateX(calc(100vw + 80px)) scaleX(1)}50%{transform:translateX(calc(100vw + 80px)) scaleX(-1)}99.9%{transform:translateX(-100px) scaleX(-1)}100%{transform:translateX(-100px) scaleX(1)}}
@keyframes walkL{0%{transform:translateX(calc(100vw + 80px)) scaleX(-1)}49.9%{transform:translateX(-100px) scaleX(-1)}50%{transform:translateX(-100px) scaleX(1)}99.9%{transform:translateX(calc(100vw + 80px)) scaleX(1)}100%{transform:translateX(calc(100vw + 80px)) scaleX(-1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes spinStar{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.15) rotate(4deg)}100%{transform:scale(1) rotate(-2deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ==========================
   PAGE 2 - TO DO LIST
   ========================== */
#page2{
  min-height:100vh;scroll-snap-align:start;
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;padding:60px 20px;
  background:#111111;
}

.p2-inner{position:relative;z-index:5;width:100%;max-width:460px}

.todo-title{
  font-family:'Black Ops One',cursive;
  font-size:clamp(54px,13vw,92px);
  color:#d8d8d8;letter-spacing:0.08em;
  text-shadow:5px 5px 0 #111111,-2px -1px 0 #222222;
  display:inline-block;transform:rotate(-2deg);
  margin-bottom:22px;line-height:1;
}

.task-card{
  background:rgba(220,220,220,0.93);
  border:3px solid #2a2a2a;border-radius:7px;
  padding:18px 22px;
  box-shadow:7px 8px 0 #2a2a2a;
  position:relative;
}
.task-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:repeating-linear-gradient(90deg,#e0e0e0 0,#e0e0e0 14px,transparent 14px,transparent 20px);
  border-radius:5px 5px 0 0;
}

.task-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:2px dashed rgba(30,30,30,0.4);
}
.task-row:last-child{border-bottom:none}
.task-txt{font-family:'Rye',cursive;font-size:clamp(13px,3.5vw,17px);color:#2a2a2a;flex:1}

.go-btn{
  font-family:'Rye',cursive;font-size:12px;
  color:#d8d8d8;background:#2a2a2a;border:none;
  padding:7px 15px;border-radius:5px;cursor:pointer;
  letter-spacing:0.08em;box-shadow:3px 3px 0 #111111;
  text-decoration:none;display:inline-block;
  transition:transform 0.12s;
}

/* Art peek above form */


.form-panel{
  background:rgba(220,220,220,0.9);
  backdrop-filter:blur(3px);
  border-radius:14px;
  padding:44px 26px 28px;
  position:relative;z-index:5;
}

.form-heading{
  font-family:'Black Ops One',cursive;
  font-size:clamp(34px,8vw,58px);
  color:#d8d8d8;letter-spacing:0.1em;
  text-shadow:3px 4px 0 rgba(0,0,0,0.4);
  text-align:center;margin-bottom:22px;line-height:1;
}

.fl{
  display:block;font-family:'Courier Prime',monospace;
  font-size:clamp(9px,2.3vw,11px);
  color:#2a2a2a;letter-spacing:0.38em;
  text-transform:uppercase;margin-bottom:7px;
}
.fi{
  width:100%;background:rgba(220,220,220,0.9);
  border:2.5px solid rgba(30,30,30,0.4);border-radius:8px;
  padding:13px 18px;
  font-family:'Courier Prime',monospace;font-size:clamp(12px,3vw,14px);
  color:#0f0f0f;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
  letter-spacing:0.05em;
  box-shadow:inset 0 2px 5px rgba(30,30,30,0.4);
}
.fi::placeholder{color:rgba(30,30,30,0.4)}
.fi:focus{
  background:rgba(255,250,215,0.97);
  border-color:#e0e0e0;
  box-shadow:0 0 0 3px rgba(200,200,200,0.3),inset 0 2px 5px rgba(30,30,30,0.4);
}
textarea.fi{resize:none;height:88px;line-height:1.5}
.fg{margin-bottom:17px}

.sub-wrap{margin-top:22px;text-align:center}
.sub-btn{
  font-family:'Rye',cursive;
  font-size:clamp(42px,9vw,70px);
  color:#d8d8d8;background:none;border:none;cursor:pointer;
  letter-spacing:0.02em;
  text-shadow:4px 5px 0 rgba(0,0,0,0.45),-1px -1px 0 rgba(200,200,200,0.3);
  transition:transform 0.15s;display:inline-block;position:relative;
}
.sub-btn::after{
  content:'';position:absolute;bottom:-6px;left:8%;right:8%;
  height:5px;background:#0f0f0f;border-radius:3px;
  opacity:0.25;filter:blur(3px);
}
.sub-btn:hover{transform:scale(1.06) rotate(-1.5deg)}
.sub-btn:active{transform:scale(0.96)}

/* success */
#succ{display:none;text-align:center;padding:32px 10px}
.succ-ico{font-size:70px;display:block;animation:popIn 0.5s cubic-bezier(.36,.07,.19,.97) both}
.succ-h{font-family:'Black Ops One',cursive;font-size:clamp(38px,9vw,64px);color:#d8d8d8;letter-spacing:0.1em;margin-top:14px;text-shadow:3px 4px 0 rgba(0,0,0,0.35)}
.succ-p{font-family:'Courier Prime',monospace;font-size:12px;color:rgba(220,220,220,0.9);letter-spacing:0.2em;text-transform:uppercase;margin-top:10px}

/* ==========================
   X ICON FIXED
   ========================== */
.x-fixed{
  position:fixed;bottom:22px;left:22px;z-index:1000;
  width:52px;height:52px;
  background:#d8d8d8;border:3px solid #2a2a2a;border-radius:7px;
  box-shadow:3px 4px 0 #2a2a2a;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;cursor:pointer;
  transition:transform 0.15s,box-shadow 0.15s;
}
.x-fixed:hover{transform:translate(-2px,-2px) rotate(-3deg);box-shadow:5px 7px 0 #2a2a2a}
.x-fixed svg{width:22px;height:22px;fill:#0f0f0f}

/* star svg inline */
.st{position:absolute;pointer-events:none}
</style>
</head>

  <div class="walker" style="top:24%;animation:walkR 19s linear infinite 9s">
    <svg width="24" height="19" viewBox="0 0 40 30" fill="none">
      <ellipse cx="20" cy="16" rx="15" ry="11" fill="#9a9080"/>

  <!-- TITLE block -->

<!-- ===================== PAGE 3 ===================== -->
<section id="page3">
  <!-- Stars page 3 -->
  <div class="p3-inner">
<div class="form-panel">
      <h2 class="form-heading">CLAIM YOUR SPOT</h2>

      <div id="form-fields">
        <div class="fg">
          <label class="fl">Ethereum Address</label>
          <input class="fi" id="wallet" type="text" placeholder="0x or name.eth"/>
        </div>
        <div class="fg">
          <label class="fl">X-Handle</label>
          <input class="fi" id="twitter" type="text" placeholder="@yourX"/>
        </div>
        <div class="fg">
          <label class="fl">Why should you get whitelisted?</label>
          <textarea class="fi" id="reason" placeholder="Tell us."></textarea>
        </div>
        <div class="sub-wrap">
          <button class="sub-btn" onclick="handleSubmit()">SUBMIT</button>
        </div>
      </div>

      <div id="succ">
        <span class="succ-ico">🦝</span>
        <h2 class="succ-h">YOU'RE IN.</h2>
        <p class="succ-p">Stay masked. Watch for updates.</p>
      </div>
    </div>
  </div>
</section>

<!-- X fixed icon -->
<a href="https://x.com/pawbandits" class="x-fixed" target="_blank" title="Follow on X">
  <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.26 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
</a>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwf7bORByaM9fL7M6janeDzjS_zRdnT3PU4yYOlzU-vjp7wkkItUDVwi2PmhW_poBW45A/exec';

async function handleSubmit(){
  const w=document.getElementById('wallet').value.trim();
  const t=document.getElementById('twitter').value.trim();
  const r=document.getElementById('reason').value.trim();
  let ok=true;
  if(!w){shake('wallet');ok=false}
  if(!t){shake('twitter');ok=false}
  if(!ok) return;

  const btn=document.querySelector('.sub-btn');
  btn.textContent='SENDING...';
  btn.disabled=true;

  try{
    await fetch(SHEET_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({wallet:w,twitter:t,reason:r})
    });
    document.getElementById('form-fields').style.display='none';
    document.getElementById('succ').style.display='block';
  } catch(e){
    btn.textContent='SUBMIT';
    btn.disabled=false;
    alert('Something went wrong. Please try again.');
  }
}
function shake(id){
  const el=document.getElementById(id);
  el.style.borderColor='#888888';
  el.style.animation='shake 0.35s ease';
  el.focus();
  setTimeout(()=>{el.style.animation='';el.style.borderColor=''},700);
}
</script>
